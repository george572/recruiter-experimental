<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusScroll Demo</title>
    <link rel="stylesheet" href="./focus-scroll.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f5f5f7;
        color: #111;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1rem 4rem;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.25rem;
      }

      p.lead {
        margin: 0 0 1.5rem;
        color: #666;
        font-size: 0.95rem;
      }

      .focus-scroll-card h2 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }

      .focus-scroll-card p {
        margin: 0;
        color: #555;
        line-height: 1.5;
      }

      .meta {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FocusScroll</h1>
      <p class="lead">Scroll vertically — cards resize, fade, and desaturate based on distance from center.</p>

      <div class="focus-scroll-wrap">
        <div class="focus-scroll no-scrollbar" data-focus-scroll id="carousel">
          <!-- items injected by script -->
        </div>
      </div>

      <p class="meta" id="status">Active card: 1</p>
    </main>

    <script type="module">
      import { FocusScroll } from "./focus-scroll.js"

      const cards = [
        { title: "Senior Frontend Engineer", company: "Meridian Labs" },
        { title: "Product Designer", company: "Northwind" },
        { title: "Backend Engineer", company: "Atlas Health" },
        { title: "Engineering Manager", company: "Riverstone" },
        { title: "Data Scientist", company: "Cobalt AI" },
      ]

      const carouselEl = document.getElementById("carousel")
      carouselEl.innerHTML = cards
        .map(
          (card) => `
          <div class="focus-scroll__item">
            <div class="focus-scroll__content">
              <article class="focus-scroll-card">
                <h2>${card.title}</h2>
                <p>${card.company}</p>
              </article>
            </div>
          </div>
        `,
        )
        .join("")

      const status = document.getElementById("status")

      const carousel = new FocusScroll({
        container: carouselEl,
        onActiveChange(index) {
          status.textContent = `Active card: ${index + 1}`
        },
      })

      // Example: expose for debugging
      window.carousel = carousel
    </script>
  </body>
</html>
